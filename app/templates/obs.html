<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ church_name }} OBS Captions</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="obs-page">
  {% if return_to_operator %}
  <a class="obs-preview-back" href="/operator#audience">Back to operator</a>
  {% endif %}
  <main class="obs-shell">
    <div id="currentCaption" class="obs-caption">Waiting for captions…</div>
    <div id="connection" class="obs-status">Connecting</div>
    <div id="history" class="obs-history" aria-hidden="true"></div>
  </main>
  <script src="/static/client.js"></script>
</body>
</html>
